<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pan&Co. Realty LLC | Premier SoCal Acquisitions</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 11, 16, 0.6); /* 半透明深色，对应皇家蓝 */
            --glass-border: rgba(197, 160, 89, 0.2); /* 哑光金边框 */
            --accent-gold: #C5A059;
            --off-white: #F1F1F1;
            --text-gray: #A0A0A0;
            --compliance-gray: #666; /* 水印灰 */
            --serif-font: 'Playfair Display', serif;
            --sans-serif-font: 'Montserrat', sans-serif;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: var(--sans-serif-font); overflow: hidden; color: var(--off-white); font-weight: 300; }

        /* 全屏背景图 (南加州豪宅场景) */
        .bg-image {
            background-image: url('https://images.pexels.com/photos/1571460/pexels-photo-1571460.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); /* 可替换为自定义高清图 */
            background-size: cover; background-position: center; filter: blur(3px) brightness(0.6); position: fixed; width: 100%; height: 100%; z-index: -1; transform: scale(1.1);
        }

        /* 顶部 Logo 勋章 (左上角浮动) */
        .header-logo { position: absolute; top: 40px; left: 40px; width: 220px; opacity: 0.8; z-index: 10; }

        /* 核心毛玻璃表单容器 */
        .glass-container { position: relative; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; padding: 20px; box-sizing: border-box; }

        .form-card {
            background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 80px 60px; width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-card h1 { font-family: var(--sans-serif-font); font-weight: 100; font-size: 2.8em; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 6px; margin: 0 0 20px; }
        .form-card p { font-size: 1.1em; color: var(--text-gray); font-family: var(--serif-font); margin: 0 0 50px; line-height: 1.6; }

        .form-card input { width: 100%; padding: 18px; margin-bottom: 25px; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; font-family: var(--sans-serif-font); font-size: 1em; }
        .form-card input:focus { border-color: var(--accent-gold); outline: none; }

        .form-card button { width: 100%; padding: 20px; background: var(--accent-gold); color: #000; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-size: 1.1em; transition: background 0.3s; margin-top: 10px; }
        .form-card button:hover { background: #D4AF37; }

        /* 10DLC 声明 (水印化) */
        .compliance-watermark { font-size: 0.75em; color: var(--compliance-gray); font-family: sans-serif; text-align: center; max-width: 500px; margin: 50px auto 0; line-height: 1.6; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>
    <div class="bg-image"></div>

    <img src="image_36.png" alt="Pan&Co. Realty LLC" class="header-logo">

    <div class="glass-container">
        <div class="form-card">
            <h1>Direct Offer</h1>
            <p>Pan&Co. Realty LLC. Discreet direct acquisitions for Southern California's premier asset holders.</p>
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <input type="text" name="address" placeholder="Property Address" required>
                <input type="text" name="name" placeholder="Contact Name" required>
                <input type="tel" name="phone" placeholder="Direct Number" required>
                <button type="submit">Get Your Private Offer</button>
            </form>
        </div>
    </div>

    <div class="compliance-watermark">
        <p>Pan&Co. Realty LLC | 735 Alder Way, Montebello, CA 90640</p>
        <p>By submitting this form, you consent to receive SMS communications from Pan&Co. Realty LLC. Reply STOP to opt-out.</p>
    </div>
</body>
</html>
